<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login | STASIS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<style>
:root {
  --bg-deep:#050a0f; --bg-mid:#0a1622; --accent:#00f2ff;
  --accent-glow:rgba(0,242,255,.4); --glass-bg:rgba(10,25,41,.75);
  --glass-border:rgba(0,242,255,.3); --text-secondary:rgba(255,255,255,.6);
  --input-bg:rgba(0,0,0,.5); --error:#ff4d4d; --success:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{ font-family:"Space Grotesk",sans-serif; height:100vh; background:radial-gradient(circle,var(--bg-mid),var(--bg-deep)); display:flex; justify-content:center; align-items:center; color:white; overflow:hidden; }
#starfield{ position:fixed; inset:0; z-index:-3; pointer-events:none; }
.orbit{ position:fixed; border:1px dashed rgba(0,242,255,.15); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:-2; }
.orbit.small{width:400px;height:400px;animation:spin 40s linear infinite}
.orbit.medium{width:650px;height:650px;animation:spin 80s linear infinite}
.orbit.large{width:900px;height:900px;animation:spin 120s linear infinite}
@keyframes spin{ to{transform:translate(-50%,-50%) rotate(360deg)} }
.grid-pattern{ position:fixed; inset:0; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size:50px 50px; opacity:.12; mask-image:radial-gradient(circle,black 20%,transparent 80%); z-index:-1; }
.login-card{ width:90%; max-width:380px; padding:50px 30px 40px; background:var(--glass-bg); backdrop-filter:blur(25px); border-radius:32px; border:1px solid var(--glass-border); box-shadow:0 0 50px rgba(0,0,0,.6); transition: all 0.3s ease;}
header{text-align:center;margin-bottom:30px}
header h1{font-size:2.2rem;letter-spacing:2px;text-transform:uppercase}
header p{font-size:.75rem;color:var(--accent);letter-spacing:4px;margin-top:6px}
.msg{ display:none; text-align:center; font-size:.85rem; margin-bottom:14px; }
.msg.error{color:var(--error)} .msg.success{color:var(--success)}
.form-group{margin-bottom:20px}
.input-wrapper{position:relative;display:flex;align-items:center}
.input-icon{position:absolute;left:18px;color:var(--accent);font-size:20px}
.toggle-password{position:absolute;right:18px;cursor:pointer;color:var(--text-secondary)}
input{ width:100%; height:60px; background:var(--input-bg); border:1px solid rgba(0,242,255,.1); border-radius:16px; padding:0 48px 0 54px; color:white; }
button{ width:100%; height:60px; background:var(--accent); border:none; border-radius:16px; font-weight:700; letter-spacing:2px; cursor:pointer; box-shadow:0 0 30px var(--accent-glow); display:flex; justify-content:center; align-items:center; gap:10px; margin-top: 10px;}
button:disabled{opacity:.6}
.spinner{ width:18px; height:18px; border:3px solid rgba(0,0,0,.2); border-top:3px solid #020617; border-radius:50%; animation:spinSmall 1s linear infinite; display:none; }
@keyframes spinSmall{to{transform:rotate(360deg)}}
.register-link{text-align:center;margin-top:25px;font-size:.9rem;color:var(--text-secondary)}
.register-link a{color:var(--accent);text-decoration:none;font-weight:600; cursor:pointer;}
.forgot-pass{text-align:right; font-size:0.8rem; margin-top:-10px; margin-bottom:15px; display:block;}
.forgot-pass a {color:var(--text-secondary); text-decoration:none; transition:0.2s; cursor:pointer;}
.forgot-pass a:hover {color:var(--accent);}
.hidden { display: none !important; }
</style>
</head>

<body>
<canvas id="starfield"></canvas>
<div class="orbit small"></div><div class="orbit medium"></div><div class="orbit large"></div>
<div class="grid-pattern"></div>

<main class="login-card">
    <header>
        <h1 id="mainTitle">ACCESS STASIS</h1>
        <p id="subTitle">AUTHENTICATE IDENTITY</p>
    </header>

    <div id="error-msg" class="msg error"></div>
    <div id="success-msg" class="msg success"></div>

    <div id="step-login">
        <div class="form-group">
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">mail</span>
                <input id="email" placeholder="Email"/>
            </div>
        </div>
        <div class="form-group">
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">lock</span>
                <input id="password" type="password" placeholder="Password"/>
                <span class="material-symbols-outlined toggle-password" onclick="toggle('password', this)">visibility</span>
            </div>
        </div>
        <div class="forgot-pass">
            <a onclick="switchView('forgot')">Forgot Password?</a>
        </div>
        <button id="loginBtn" onclick="login()">
            <span id="btnText">LOGIN</span>
            <span id="spinner" class="spinner"></span>
        </button>
        <div class="register-link">New traveler? <a href="register.html">Register</a></div>
    </div>

    <div id="step-forgot" class="hidden">
        <p style="text-align:center; font-size:12px; margin-bottom:20px; color:var(--text-secondary);">Enter your email to receive a reset code.</p>
        <div class="form-group">
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">mail</span>
                <input id="resetEmail" placeholder="Email"/>
            </div>
        </div>
        <button id="forgotBtn" onclick="requestReset()">
            <span id="forgotBtnText">SEND CODE</span>
            <span id="forgotSpinner" class="spinner"></span>
        </button>
        <div class="register-link"><a onclick="switchView('login')">Return to Login</a></div>
    </div>

    <div id="step-reset" class="hidden">
        <p style="text-align:center; font-size:12px; margin-bottom:20px; color:var(--text-secondary);">Enter the 6-digit code and your new password.</p>
        <div class="form-group">
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">password</span>
                <input id="resetOtp" placeholder="OTP Code" maxlength="6" style="text-align:center; letter-spacing: 4px;"/>
            </div>
        </div>
        <div class="form-group">
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">lock</span>
                <input id="newPassword" type="password" placeholder="New Password"/>
                <span class="material-symbols-outlined toggle-password" onclick="toggle('newPassword', this)">visibility</span>
            </div>
        </div>
        <button id="resetBtn" onclick="updatePassword()">
            <span id="resetBtnText">UPDATE PASSWORD</span>
            <span id="resetSpinner" class="spinner"></span>
        </button>
        <div class="register-link"><a onclick="switchView('login')">Cancel</a></div>
    </div>
</main>

<script>
const API_BASE = "http://localhost:5000";
let targetEmail = "";

function toggle(id, icon){
  const el=document.getElementById(id);
  el.type=el.type==="password"?"text":"password";
  icon.textContent=el.type==="password"?"visibility":"visibility_off";
}

function showMsg(type, text) {
    const err = document.getElementById("error-msg");
    const suc = document.getElementById("success-msg");
    err.style.display = suc.style.display = "none";
    if (type === 'error') { err.innerText = text; err.style.display = "block"; }
    if (type === 'success') { suc.innerText = text; suc.style.display = "block"; }
}

function switchView(view) {
    document.getElementById("error-msg").style.display = "none";
    document.getElementById("success-msg").style.display = "none";
    document.getElementById("step-login").classList.add("hidden");
    document.getElementById("step-forgot").classList.add("hidden");
    document.getElementById("step-reset").classList.add("hidden");
    
    if (view === 'login') {
        document.getElementById("step-login").classList.remove("hidden");
        document.getElementById("mainTitle").innerText = "ACCESS STASIS";
        document.getElementById("subTitle").innerText = "AUTHENTICATE IDENTITY";
    } else if (view === 'forgot') {
        document.getElementById("step-forgot").classList.remove("hidden");
        document.getElementById("mainTitle").innerText = "SYSTEM RECOVERY";
        document.getElementById("subTitle").innerText = "LOCATE IDENTITY";
    } else if (view === 'reset') {
        document.getElementById("step-reset").classList.remove("hidden");
        document.getElementById("mainTitle").innerText = "UPDATE CREDENTIALS";
        document.getElementById("subTitle").innerText = "SECURE IDENTITY";
    }
}

// 1. STANDARD LOGIN
async function login(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  const btn=document.getElementById("loginBtn"), spinner=document.getElementById("spinner"), text=document.getElementById("btnText");

  showMsg('', '');
  if(!email || !password) return showMsg('error', "Enter email and password");

  btn.disabled=true; spinner.style.display="inline-block"; text.textContent="LOGGING IN";

  try {
    const res=await fetch(`${API_BASE}/api/auth/login`,{
      method:"POST", headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({email,password})
    });
    const data=await res.json();
    btn.disabled=false; spinner.style.display="none"; text.textContent="LOGIN";

    if(!res.ok) return showMsg('error', data.msg||"Invalid credentials");

    localStorage.setItem("token",data.token);
    location.href="dashboard.html";
  } catch(e) {
      btn.disabled=false; spinner.style.display="none"; text.textContent="LOGIN";
      showMsg('error', "Server error");
  }
}

// 2. REQUEST OTP FOR PASSWORD RESET
async function requestReset() {
    const email = document.getElementById("resetEmail").value.trim();
    const btn=document.getElementById("forgotBtn"), spinner=document.getElementById("forgotSpinner"), text=document.getElementById("forgotBtnText");

    if(!email) return showMsg('error', "Please enter your email");
    
    btn.disabled=true; spinner.style.display="inline-block"; text.textContent="SENDING";

    try {
        const res = await fetch(`${API_BASE}/api/auth/forgot-password`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        
        btn.disabled=false; spinner.style.display="none"; text.textContent="SEND CODE";
        
        if(!res.ok) return showMsg('error', data.msg);

        targetEmail = email; // Save for next step
        showMsg('success', "Recovery code sent!");
        switchView('reset');
    } catch(e) {
        btn.disabled=false; spinner.style.display="none"; text.textContent="SEND CODE";
        showMsg('error', "Server error");
    }
}

// 3. SUBMIT NEW PASSWORD WITH OTP
async function updatePassword() {
    const otp = document.getElementById("resetOtp").value.trim();
    const newPassword = document.getElementById("newPassword").value;
    const btn=document.getElementById("resetBtn"), spinner=document.getElementById("resetSpinner"), text=document.getElementById("resetBtnText");

    if(!otp || !newPassword) return showMsg('error', "Fill all fields");
    if(newPassword.length < 6) return showMsg('error', "Password must be at least 6 characters");

    btn.disabled=true; spinner.style.display="inline-block"; text.textContent="UPDATING";

    try {
        const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: targetEmail, otp, newPassword })
        });
        const data = await res.json();
        
        btn.disabled=false; spinner.style.display="none"; text.textContent="UPDATE PASSWORD";
        
        if(!res.ok) return showMsg('error', data.msg || "Invalid code");

        showMsg('success', "Password updated successfully!");
        setTimeout(() => { switchView('login'); document.getElementById("password").value = ""; }, 2000);
    } catch(e) {
        btn.disabled=false; spinner.style.display="none"; text.textContent="UPDATE PASSWORD";
        showMsg('error', "Server error");
    }
}

// Background Animation (unchanged)
const canvas=document.getElementById("starfield"); const ctx=canvas.getContext("2d");
let w,h; function resize(){w=canvas.width=innerWidth;h=canvas.height=innerHeight}
resize();addEventListener("resize",resize);
const mouse={x:null,y:null};
addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY});
addEventListener("mouseleave",()=>mouse.x=mouse.y=null);
const stars=[...Array(120)].map(()=>({x:Math.random()*w,y:Math.random()*h,vx:0,vy:0,r:Math.random()*1.5+0.5}));
function animate(){
  ctx.clearRect(0,0,w,h);
  stars.forEach(s=>{
    if(mouse.x){
      const dx=s.x-mouse.x,dy=s.y-mouse.y; const d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){ s.vx+=(dx/d)*(120-d)/120*.6; s.vy+=(dy/d)*(120-d)/120*.6; }
    }
    s.vx*=.95;s.vy*=.95; s.x+=s.vx;s.y+=s.vy;
    if(s.x<0)s.x=w;if(s.x>w)s.x=0; if(s.y<0)s.y=h;if(s.y>h)s.y=0;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle="rgba(0,242,255,.6)"; ctx.fill();
  }); requestAnimationFrame(animate);
} animate();
</script>
</body>
</html>
